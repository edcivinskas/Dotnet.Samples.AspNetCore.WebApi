name: Hotfix Parallel Backport to Develop

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  create-or-update-backport:
    if: >
      github.event.pull_request.base.ref == 'master' &&
      startsWith(github.event.pull_request.head.ref, 'hotfix/')

    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout develop as base
        uses: actions/checkout@v4
        with:
          ref: develop
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Parse ticket and set backport branch name
        id: parse
        run: |
          ORIGINAL="${{ github.event.pull_request.head.ref }}"
          TICKET="${ORIGINAL#hotfix/}"
          BACKPORT="hotfix/${TICKET}-2"
          echo "backport_branch=${BACKPORT}" >> $GITHUB_OUTPUT
          echo "ticket=${TICKET}" >> $GITHUB_OUTPUT

      - name: Reset backport branch to current develop
        run: |
          git checkout -B ${{ steps.parse.outputs.backport_branch }}

      - name: Fetch hotfix branch
        run: |
          git fetch origin master
          git fetch origin ${{ github.event.pull_request.head.ref }}

      - name: Cherry-pick only non-merge commits (skip master merges)
        id: cherrypick
        continue-on-error: true
        run: |
          echo "=== Cherry-picking only real hotfix changes (skipping merge commits from master) ==="

          # Get only non-merge commits in chronological order
          COMMITS=$(git log --no-merges --pretty=format:%H origin/master..origin/${{ github.event.pull_request.head.ref }} | tac)

          if [ -z "$COMMITS" ]; then
            echo "No non-merge commits found in this PR."
            echo "CONFLICT_STATUS=clean" >> $GITHUB_ENV
          else
            for commit in $COMMITS; do
              echo "→ Cherry-picking commit: $commit"
              if ! git cherry-pick "$commit"; then
                echo "⚠️ Conflict detected on commit $commit"
                echo "CONFLICT_STATUS=has_conflicts" >> $GITHUB_ENV
              fi
            done
          fi

      - name: Push (or force-update) the backport branch
        run: |
          git push --force origin ${{ steps.parse.outputs.backport_branch }}

      - name: Create or update the backport PR
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ steps.parse.outputs.backport_branch }}
          base: develop
          title: "[Backport] ${{ github.event.pull_request.head.ref }} → develop"
          body: |
            **Automatic parallel backport** for hotfix PR #${{ github.event.pull_request.number }}

            Original PR: [${{ github.event.pull_request.title }}](${{ github.event.pull_request.html_url }})

            This PR is kept in sync automatically whenever the original hotfix PR (`hotfix/${{ steps.parse.outputs.ticket }}`) is updated.

            Only non-merge commits were cherry-picked (master merges into the hotfix branch are intentionally skipped to avoid leaking master changes into develop).

            ${{ env.CONFLICT_STATUS == 'has_conflicts' && '⚠️ Conflicts occurred during cherry-pick. Please resolve them manually.' || '✅ No conflicts detected.' }}
          labels: backport, hotfix
          assignees: ${{ github.actor }}