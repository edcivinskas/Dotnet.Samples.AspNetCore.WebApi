name: Hotfix Backport to Develop (auto hotfix-2)

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  create-hotfix-backport:
    # Safety checks - only run for hotfix PRs targeting master
    if: >
      github.event.pull_request.base.ref == 'master' &&
      startsWith(github.event.pull_request.head.ref, 'hotfix/')

    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout develop (base for hotfix-2)
        uses: actions/checkout@v4
        with:
          ref: develop
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Parse ticket and compute backport branch name
        id: parse
        run: |
          ORIGINAL_BRANCH="${{ github.event.pull_request.head.ref }}"
          TICKET="${ORIGINAL_BRANCH#hotfix/}"
          BACKPORT_BRANCH="hotfix/${TICKET}-2"
          echo "backport_branch=${BACKPORT_BRANCH}" >> $GITHUB_OUTPUT
          echo "✅ Backport branch will be: ${BACKPORT_BRANCH}"

      - name: Create/reset hotfix-2 branch from develop
        run: |
          git checkout -B ${{ steps.parse.outputs.backport_branch }}

      - name: Fetch the hotfix PR branch
        run: |
          git fetch origin ${{ github.event.pull_request.head.ref }}

      - name: Cherry-pick all commits from the hotfix PR
        run: |
          echo "Cherry-picking commits from master..${{ github.event.pull_request.head.ref }}"
          git cherry-pick origin/${{ github.event.pull_request.base.ref }}..origin/${{ github.event.pull_request.head.ref }}

      - name: Push the updated hotfix-2 branch
        run: |
          git push --force origin ${{ steps.parse.outputs.backport_branch }}

      - name: Create or update backport PR to develop
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ steps.parse.outputs.backport_branch }}
          base: develop
          title: "[Backport] ${{ github.event.pull_request.head.ref }} → develop"
          body: |
            Auto-generated backport of PR #${{ github.event.pull_request.number }}  
            Original PR: [${{ github.event.pull_request.title }}](${{ github.event.pull_request.html_url }})

            This PR was created/updated automatically when the hotfix PR was opened or changed.
          labels: backport, hotfix
          assignees: ${{ github.actor }}
          draft: false